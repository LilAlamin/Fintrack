name: aplikasi_pencatatan_keuangan
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_linkify: ^6.0.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.2.1
  image_cropper: ^7.1.0
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
